<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PharmaNerd | Compare</title>
    <link rel="stylesheet" href="styles/main.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar"></aside>
        <main class="main">
            <header class="page-header">
                <div class="page-title">
                    <h2>Side-by-side comparison</h2>
                    <p>Compare up to four drugs across mechanisms, risks, and durations.</p>
                </div>
            </header>

            <section class="glass">
                <div class="search-bar">
                    <input id="compareInput" type="text" list="compareOptions" placeholder="Add a drug to compare" />
                    <datalist id="compareOptions"></datalist>
                    <button class="btn" id="addCompare">Add</button>
                    <button class="btn secondary" id="clearCompare">Clear all</button>
                </div>
                <div class="section">
                    <div class="chips" id="compareSelected"></div>
                </div>
                <div class="section" id="compareTable"></div>
            </section>
        </main>
    </div>

    <script src="scripts/nav.js"></script>
    <script src="scripts/data.js"></script>
    <script src="scripts/components.js"></script>
    <script src="scripts/settings.js"></script>
    <script src="scripts/rxnorm.js"></script>
    <script src="scripts/ui.js"></script>
    <script src="scripts/topNavSearch.js"></script>
    <script src="scripts/compare.js"></script>
</body>

</html>
