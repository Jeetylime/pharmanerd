<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PharmaNerd | Drug History Timeline</title>
    <link rel="stylesheet" href="styles/main.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar"></aside>
        <main class="main">
            <header class="page-header">
                <div class="page-title">
                    <h2>History timeline</h2>
                    <p>Discover the historical context of various drugs.</p>
                </div>
            </header>

            <section class="section glass">
                <div id="historyContainer"></div>
            </section>
        </main>
    </div>

    <script src="scripts/nav.js"></script>
    <script src="scripts/data.js"></script>
    <script src="scripts/components.js"></script>
    <script src="scripts/settings.js"></script>
    <script src="scripts/topNavSearch.js"></script>
    <script src="scripts/features/history.js"></script>
    <script>
        function initHistory() {
            var container = document.getElementById('historyContainer');
            if (window.PharmaNerdHistory && container) {
                window.PharmaNerdHistory.renderHistoryTimeline(container);
            }
        }
        if (window.PharmaNerdHistory) {
            initHistory();
        } else {
            window.addEventListener('pharmanerd:data-loaded', initHistory);
        }
    </script>
</body>

</html>
