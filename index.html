<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PharmaNerd | Pharmacology Encyclopedia</title>
    <link rel="stylesheet" href="styles/main.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar"></aside>
        <main class="main">
            <header class="page-header">
                <div class="page-title">
                    <h2>Explore the pharmacopeia</h2>
                    <p>Browse 40+ drugs with mechanisms, timelines, and interaction data.</p>
                </div>
                <div>
                    <button class="btn" id="surpriseBtn">Surprise me</button>
                </div>
            </header>

            <section class="glass section" id="filterChips" style="margin-bottom:16px;">
                <div class="filter-chips">
                    <div class="filter-group">
                        <span class="filter-label">Class</span>
                        <div class="chips" id="classFilterChips"></div>
                    </div>
                    <div class="filter-group">
                        <span class="filter-label">Type</span>
                        <div class="chips" id="typeFilterChips"></div>
                    </div>
                    <div class="filter-group">
                        <span class="filter-label">Effect</span>
                        <div class="chips" id="effectFilterChips"></div>
                    </div>
                </div>
            </section>

            <section class="section">
                <div class="section-head">
                    <h3>Recent</h3>
                </div>
                <div class="card-grid" id="recentGrid"></div>
            </section>

            <section class="section">
                <div class="section-head">
                    <h3>Browse</h3>
                    <span id="resultCount" class="chip"></span>
                </div>
                <div class="card-grid" id="drugGrid"></div>
            </section>
        </main>
    </div>

    <script src="scripts/nav.js"></script>
    <script src="scripts/data.js"></script>
    <script src="scripts/components.js"></script>
    <script src="scripts/settings.js"></script>
    <script src="scripts/rxnorm.js"></script>
    <script src="scripts/search.js"></script>
    <script src="scripts/ui.js"></script>
    <script src="scripts/filters.js"></script>
    <script src="scripts/tutorial.js"></script>
    <script src="scripts/navSearch.js"></script>
</body>

</html>
