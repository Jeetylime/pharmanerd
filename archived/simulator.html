<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PharmaNerd | PK Simulator</title>
    <link rel="stylesheet" href="styles/main.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">PN</div>
                <div>
                    <h1>PharmaNerd</h1>
                    <p>Pharmacology Encyclopedia</p>
                </div>
            </div>
            <nav class="nav">
                <div class="nav-left">
                    <a class="nav-link" href="index.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 10L12 4l8 6v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z" />
                        </svg>
                        Browse
                    </a>
                    <a class="nav-link" href="compare.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h6v16H4zM14 8h6v12h-6z" />
                        </svg>
                        Compare
                    </a>
                    <a class="nav-link" href="interactions.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M7 7h10v10H7z" />
                            <path d="M3 12h4M17 12h4M12 3v4M12 17v4" />
                        </svg>
                        Interactions
                    </a>

                    <a class="nav-link" href="receptors.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 3c4 0 7 3 7 7 0 3-2 5-4 6v3H9v-3c-2-1-4-3-4-6 0-4 3-7 7-7z" />
                            <path d="M9 21h6" />
                        </svg>
                        Receptors
                    </a>
                    <a class="nav-link" href="classes.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                        </svg>
                        Classes
                    </a>
                    <a class="nav-link" href="history.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 6v6l4 2" />
                        </svg>
                        History
                    </a>
                </div>
                <div class="nav-right">
                    <a class="nav-link" href="search.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="7" />
                            <path d="M21 21l-4.3-4.3" />
                        </svg>
                        Search
                    </a>
                </div>
            </nav>
        </aside>
        <main class="main">
            <header class="page-header">
                <div class="page-title">
                    <h2>PK Curve Simulator</h2>
                    <p>One-compartment model visualization for educational exploration only.</p>
                </div>
            </header>

            <section class="glass simulator-grid">
                <div class="form-grid">
                    <div style="grid-column:1/-1;display:flex;gap:12px;align-items:center">
                        <label for="drugSelect">Select Drug</label>
                        <select id="drugSelect" style="flex:1;min-width:220px"></select>
                        <div id="drugPreview" style="width:220px"></div>
                    </div>
                    <div>
                        <label for="doseInput">Dose (mg)</label>
                        <input id="doseInput" type="number" min="0" step="1" value="50" />
                    </div>
                    <div>
                        <label for="routeSelect">Route</label>
                        <select id="routeSelect">
                            <option value="iv">IV bolus</option>
                            <option value="oral">Oral</option>
                        </select>
                    </div>
                    <div>
                        <label for="weightInput">Weight (kg)</label>
                        <input id="weightInput" type="number" min="30" step="1" value="70" />
                    </div>
                    <div>
                        <label for="halfLifeInput">Half-life (h)</label>
                        <input id="halfLifeInput" type="number" min="0.1" step="0.1" value="6" />
                    </div>
                    <div>
                        <label for="vdInput">Volume of distribution (L/kg)</label>
                        <input id="vdInput" type="number" min="0.1" step="0.1" value="0.7" />
                    </div>
                    <div>
                        <label for="bioInput">Bioavailability (0-1)</label>
                        <input id="bioInput" type="number" min="0" max="1" step="0.01" value="0.6" />
                    </div>
                    <div>
                        <label for="kaInput">Absorption rate ka (1/h)</label>
                        <input id="kaInput" type="number" min="0.1" step="0.1" value="1.2" />
                    </div>
                    <div>
                        <label for="durationInput">Duration (h)</label>
                        <input id="durationInput" type="number" min="1" step="1" value="24" />
                    </div>
                </div>
                <div class="glass plot-card" id="pkPlot"></div>
            </section>
        </main>
    </div>

    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script src="scripts/data.js"></script>
    <script src="scripts/components.js"></script>
    <script src="scripts/settings.js"></script>
    <script src="scripts/ui.js"></script>
    <script src="scripts/simulator.js"></script>
</body>

</html>
