<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PharmaNerd | Drug Class Comparison</title>
    <link rel="stylesheet" href="styles/main.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar"></aside>
        <main class="main">
            <header class="page-header">
                <div class="page-title">
                    <h2>Drug class comparison</h2>
                    <p>Compare drug classes across multiple dimensions.</p>
                </div>
            </header>

            <section class="glass section">
                <div id="classComparisonContainer"></div>
            </section>
        </main>
    </div>

    <script src="scripts/nav.js"></script>
    <script src="scripts/data.js"></script>
    <script src="scripts/components.js"></script>
    <script src="scripts/settings.js"></script>
    <script src="scripts/ui.js"></script>
    <script src="scripts/topNavSearch.js"></script>
    <script src="scripts/features/classComparison.js"></script>
    <script>
        function initClasses() {
            var container = document.getElementById('classComparisonContainer');
            if (window.PharmaNerdClassComparison && container) {
                window.PharmaNerdClassComparison.renderClassComparison(container);
            }
        }
        if (window.PharmaNerdData && window.PharmaNerdData.DRUGS) {
            initClasses();
        } else {
            window.addEventListener('pharmanerd:data-loaded', initClasses);
        }
    </script>
</body>

</html>
