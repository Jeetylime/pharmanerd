<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PharmaNerd | Drug Class Comparison</title>
    <link rel="stylesheet" href="styles/main.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">PN</div>
                <div>
                    <h1>PharmaNerd</h1>
                    <p>Pharmacology Encyclopedia</p>
                </div>
            </div>
            <nav class="nav">
                <div class="nav-left">
                    <a class="nav-link" href="index.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 10L12 4l8 6v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z" />
                        </svg>
                        Browse
                    </a>
                    <a class="nav-link" href="compare.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h6v16H4zM14 8h6v12h-6z" />
                        </svg>
                        Compare
                    </a>
                    <a class="nav-link" href="interactions.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M7 7h10v10H7z" />
                            <path d="M3 12h4M17 12h4M12 3v4M12 17v4" />
                        </svg>
                        Interactions
                    </a>

                    <a class="nav-link" href="receptors.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 3c4 0 7 3 7 7 0 3-2 5-4 6v3H9v-3c-2-1-4-3-4-6 0-4 3-7 7-7z" />
                            <path d="M9 21h6" />
                        </svg>
                        Receptors
                    </a>
                    <a class="nav-link active" href="classes.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                        </svg>
                        Classes
                    </a>
                    <a class="nav-link" href="history.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 6v6l4 2" />
                        </svg>
                        History
                    </a>
                </div>
                <div class="nav-right" style="display:flex;align-items:center;gap:12px;">
                    <input id="topSearchInput" class="top-search" type="search" placeholder="Search by name or alias..."
                        aria-label="Search drugs" />
                </div>
            </nav>
        </aside>
        <main class="main">
            <header class="page-header">
                <div class="page-title">
                    <h2>Drug Class Comparison</h2>
                    <p>Compare average potency, duration, and dependence risk across 90 drugs grouped by class.</p>
                </div>
            </header>

            <div id="classComparisonContainer"></div>
        </main>
    </div>

    <script src="scripts/data.js"></script>
    <script src="scripts/components.js"></script>
    <script src="scripts/settings.js"></script>
    <script src="scripts/ui.js"></script>
    <script src="scripts/topNavSearch.js"></script>
    <script src="scripts/features/classComparison.js"></script>
    <script>
        function initClasses() {
            var container = document.getElementById('classComparisonContainer');
            if (window.PharmaNerdClassComparison && container) {
                window.PharmaNerdClassComparison.renderClassComparison(container);
            }
        }
        if (window.PharmaNerdData && window.PharmaNerdData.DRUGS) {
            initClasses();
        } else {
            window.addEventListener('pharmanerd:data-loaded', initClasses);
        }
    </script>
</body>

</html>
