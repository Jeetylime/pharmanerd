<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PharmaNerd | Interactions</title>
    <link rel="stylesheet" href="styles/main.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar"></aside>
        <main class="main">
            <header class="page-header">
                <div class="page-title">
                    <h2>Interaction checker</h2>
                    <p>Build a combination and visualize interaction severity.</p>
                </div>
            </header>

            <section class="glass">
                <div class="search-bar">
                    <input id="interactionInput" type="text" list="interactionOptions"
                        placeholder="Add a drug to the combo" />
                    <datalist id="interactionOptions"></datalist>
                    <button class="btn" id="addInteraction">Add</button>
                    <button class="btn secondary" id="checkInteractions">Check interactions</button>
                </div>
                <div class="section">
                    <div class="chips" id="interactionSelected"></div>
                </div>
            </section>

            <section class="section">
                <div class="section-head">
                    <h3>Interaction matrix</h3>
                </div>
                <div class="chips">
                    <span class="chip">None</span>
                    <span class="severity mild">Mild</span>
                    <span class="severity moderate">Moderate</span>
                    <span class="severity severe">Severe</span>
                    <span class="severity contraindicated">Contraindicated</span>
                </div>
                <div class="matrix" id="interactionMatrix"></div>
            </section>

            <section class="section">
                <div class="section-head">
                    <h3>Interaction details</h3>
                </div>
                <div class="interaction-list" id="interactionDetails"></div>
            </section>
        </main>
    </div>

    <script src="scripts/nav.js"></script>
    <script src="scripts/data.js"></script>
    <script src="scripts/components.js"></script>
    <script src="scripts/settings.js"></script>
    <script src="scripts/rxnorm.js"></script>
    <script src="scripts/ui.js"></script>
    <script src="scripts/tutorial.js"></script>
    <script src="scripts/topNavSearch.js"></script>
    <script src="scripts/interactions.js"></script>
</body>

</html>
